server:
  port: 8080

spring:
  application:
    name: takeout-platform
  
  # Spring Boot 2.7+ 兼容性配置（解决 Knife4j 问题）
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
    cors:
      enabled: true  # 启用 CORS
      allowed-origins: "*"  # 允许所有来源（开发环境）
      allowed-methods: "*"  # 允许所有方法
      allowed-headers: "*"  # 允许所有头部
      allow-credentials: false
      max-age: 3600
  
  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/takeout_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root123
  
  # Redis 配置
  redis:
    host: localhost
    port: 6379
    password: 
    database: 0
    timeout: 10000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    # 驼峰命名转换
    map-underscore-to-camel-case: true
    # 打印 SQL 日志（开发环境开启）
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      # 主键类型：自增
      id-type: auto
      # 逻辑删除字段
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  # Mapper XML 文件位置
  mapper-locations: classpath:/mapper/**/*.xml

# 完全禁用所有 API 文档的 CORS
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
knife4j:
  enable: false

# 日志配置
logging:
  level:
    com.takeout: debug
    org.springframework.web: info
