<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景渐变 -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e4e7ed;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="400" height="300" fill="url(#bg)"/>
  
  <!-- 餐盘图标 -->
  <circle cx="200" cy="130" r="60" fill="#dcdfe6" opacity="0.5"/>
  <ellipse cx="200" cy="130" rx="50" ry="20" fill="#e4e7ed" opacity="0.8"/>
  
  <!-- 餐具 -->
  <rect x="185" y="80" width="6" height="50" rx="3" fill="#c0c4cc"/>
  <circle cx="215" cy="95" r="12" fill="#c0c4cc"/>
  <rect x="215" y="95" width="4" height="40" fill="#c0c4cc"/>
  
  <!-- 文字 -->
  <text x="200" y="220" font-family="Arial, sans-serif" font-size="18" fill="#909399" text-anchor="middle" font-weight="bold">
    美食图片
  </text>
  <text x="200" y="245" font-family="Arial, sans-serif" font-size="14" fill="#c0c4cc" text-anchor="middle">
    加载中...
  </text>
  
  <!-- 装饰元素 -->
  <circle cx="80" cy="60" r="8" fill="#f56c6c" opacity="0.3"/>
  <circle cx="320" cy="80" r="6" fill="#67c23a" opacity="0.3"/>
  <circle cx="350" cy="250" r="10" fill="#e6a23c" opacity="0.3"/>
  <circle cx="50" cy="220" r="7" fill="#409eff" opacity="0.3"/>
</svg>
